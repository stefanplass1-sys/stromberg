<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>NVV · Spruch des Tages · Mitarbeiterportal</title>
<!-- System fonts only — no external font CDNs in this environment -->
<style>
  :root {
    --brand: #1676f3;
    --brand-deep: color-mix(in oklab, var(--brand) 80%, #000 20%);
    --brand-tint: color-mix(in oklab, var(--brand) 12%, #fff 88%);
    --brand-tint2: color-mix(in oklab, var(--brand) 22%, #fff 78%);
    --bg: oklch(0.985 0.004 250);
    --bg-elev: #ffffff;
    --bg-soft: oklch(0.965 0.005 250);
    --bg-deep: oklch(0.93 0.008 250);
    --text: oklch(0.22 0.02 260);
    --text-muted: oklch(0.5 0.015 260);
    --text-dim: oklch(0.65 0.012 260);
    --border: oklch(0.91 0.006 250);
    --border-strong: oklch(0.84 0.008 250);
    --success: oklch(0.62 0.14 145);
    --warning: oklch(0.72 0.16 75);
    --danger: oklch(0.58 0.18 25);
    --radius-sm: 4px;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(15, 22, 38, 0.04), 0 0 0 1px rgba(15, 22, 38, 0.04);
    --shadow: 0 1px 3px rgba(15, 22, 38, 0.06), 0 4px 14px rgba(15, 22, 38, 0.05);
    --shadow-lg: 0 8px 28px rgba(15, 22, 38, 0.10), 0 1px 3px rgba(15, 22, 38, 0.06);
    --font-base: "IBM Plex Sans", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
    --font-serif: "IBM Plex Serif", Georgia, serif;
    --space: 16px;
    --topbar-h: 56px;
    --sidenav-w: 248px;
  }

  /* Behörde-Theme: gedecktes Beige, beinahe Amtsstube */
  .theme-beige {
    --bg: oklch(0.96 0.012 80);
    --bg-elev: oklch(0.985 0.008 80);
    --bg-soft: oklch(0.94 0.014 80);
    --bg-deep: oklch(0.90 0.018 80);
    --text: oklch(0.25 0.02 60);
    --text-muted: oklch(0.5 0.022 60);
    --text-dim: oklch(0.62 0.018 60);
    --border: oklch(0.86 0.018 80);
    --border-strong: oklch(0.78 0.024 80);
  }

  .theme-lumo-dark {
    --bg: oklch(0.18 0.018 260);
    --bg-elev: oklch(0.22 0.022 260);
    --bg-soft: oklch(0.20 0.020 260);
    --bg-deep: oklch(0.15 0.020 260);
    --text: oklch(0.94 0.008 260);
    --text-muted: oklch(0.7 0.012 260);
    --text-dim: oklch(0.55 0.012 260);
    --border: oklch(0.32 0.022 260);
    --border-strong: oklch(0.42 0.025 260);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 4px 14px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.55), 0 1px 3px rgba(0, 0, 0, 0.4);
  }

  /* Dichte */
  .density-kompakt { --space: 12px; --topbar-h: 48px; }
  .density-regulär { --space: 16px; --topbar-h: 56px; }
  .density-großzügig { --space: 22px; --topbar-h: 64px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-base);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-base);
  }

  /* ── TopBar ───────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: minmax(280px, 360px) 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 0 24px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .iconbtn {
    appearance: none;
    width: 34px; height: 34px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    position: relative;
    transition: background .12s, color .12s;
  }
  .iconbtn:hover { background: var(--bg-soft); color: var(--text); }
  .iconbtn .hamburger { font-size: 20px; line-height: 1; letter-spacing: -1px; }
  .iconbtn .dot-marker {
    position: absolute; top: 4px; right: 4px;
    background: var(--danger); color: #fff;
    font-size: 9px; font-weight: 600; font-style: normal;
    min-width: 14px; height: 14px; padding: 0 3px;
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg-elev);
  }

  .brandmark { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brandmark-logo {
    width: 36px; height: 36px;
    background: var(--brand-tint);
    color: var(--brand-deep);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brandmark-text { min-width: 0; }
  .brandmark-name {
    font-size: 13px; font-weight: 600; line-height: 1.25;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .brandmark-sub {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
    line-height: 1.25;
  }

  .topbar-search {
    position: relative;
    display: flex; align-items: center;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 10px;
    height: 34px;
    max-width: 560px;
    width: 100%;
    justify-self: center;
  }
  .topbar-search input {
    flex: 1; min-width: 0;
    border: 0; background: transparent;
    font: inherit; color: var(--text);
    outline: none;
    padding: 0 8px;
  }
  .topbar-search input::placeholder { color: var(--text-dim); }
  .topbar-search:focus-within { border-color: var(--brand); background: var(--bg-elev); }
  .search-icon { color: var(--text-dim); font-size: 16px; }
  .kbd {
    font-family: var(--font-mono);
    font-size: 10.5px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--text-muted);
    margin-left: 4px;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .user {
    display: flex; align-items: center; gap: 10px;
    padding-left: 12px;
    margin-left: 4px;
    border-left: 1px solid var(--border);
    height: 34px;
  }
  .user-avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
    color: white;
    font-size: 11px; font-weight: 600;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .user-meta { line-height: 1.25; }
  .user-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .user-role { font-size: 10.5px; color: var(--text-dim); font-family: var(--font-mono); }

  /* ── Shell + SideNav ──────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: var(--sidenav-w) 1fr;
    flex: 1;
    min-height: 0;
  }
  .app .shell:has(.sidenav.is-collapsed),
  .app:not(:has(.sidenav)) .shell { grid-template-columns: 1fr; }

  .sidenav {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    display: flex; flex-direction: column;
    overflow-y: auto;
    position: sticky;
    top: var(--topbar-h);
    height: calc(100vh - var(--topbar-h));
  }
  .sidenav.is-collapsed { display: none; }

  .navsect { padding: 6px 12px 10px; }
  .navsect-h {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 6px 12px 4px;
  }
  .navitem {
    display: flex; align-items: center; gap: 12px;
    padding: 7px 12px;
    border-radius: var(--radius);
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    line-height: 1.3;
    transition: background .1s, color .1s;
  }
  .navitem:hover { background: var(--bg-soft); color: var(--text); }
  .navitem.is-active {
    background: var(--brand-tint);
    color: var(--brand-deep);
    font-weight: 600;
  }
  .theme-lumo-dark .navitem.is-active {
    background: color-mix(in oklab, var(--brand) 25%, transparent);
    color: color-mix(in oklab, var(--brand) 30%, #fff);
  }
  .navitem-ic {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .navitem.is-active .navitem-ic { color: var(--brand); }
  .navitem-l { flex: 1; }
  .navitem-badge {
    background: var(--bg-soft);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 10.5px;
    font-family: var(--font-mono);
    padding: 1px 7px;
    border-radius: 999px;
    font-weight: 500;
  }

  .sidenav-foot {
    margin-top: auto;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  .sysstat {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text);
  }
  .sysstat-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--success) 25%, transparent);
  }
  .sysstat-meta {
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── Content ──────────────────────────────────────── */
  .content {
    padding: 28px 32px 80px;
    min-width: 0;
    background: var(--bg);
  }
  .density-kompakt .content { padding: 18px 24px 70px; }
  .density-großzügig .content { padding: 36px 44px 90px; }

  .pagehead { margin-bottom: 24px; }
  .crumb {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .crumb a {
    color: var(--text-muted); text-decoration: none;
  }
  .crumb a:hover { color: var(--brand); text-decoration: underline; }
  .crumb-sep { color: var(--border-strong); }
  .crumb-cur { color: var(--text); font-weight: 500; }

  .pagehead-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .pagehead-title {
    font-family: var(--font-serif);
    font-size: 30px;
    font-weight: 600;
    line-height: 1.1;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .pagehead-sub {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  .datebar {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow-sm);
  }
  .datebar-main {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 14px;
  }
  .datebar-pill {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--brand);
    color: white;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .datebar-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  /* ── Content Grid ─────────────────────────────────── */
  .content-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 1180px) {
    .content-grid { grid-template-columns: 1fr; }
  }
  .content-main { display: flex; flex-direction: column; gap: 24px; min-width: 0; }
  .stats { display: flex; flex-direction: column; gap: 16px; position: sticky; top: calc(var(--topbar-h) + 24px); }

  /* ── Cards ────────────────────────────────────────── */
  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .card-head h2 {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
  }
  .card-head-meta {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* ── Quote-Karte ─────────────────────────────────── */
  .quote {
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow);
    position: relative;
  }
  .quote::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--brand) 0%, var(--brand-deep) 100%);
  }
  .quote-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 22px 0;
    gap: 16px;
  }
  .quote-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    line-height: 1.4;
    border: 1px solid transparent;
  }
  .tag-primary { background: var(--brand-tint); color: var(--brand-deep); border-color: var(--brand-tint2); }
  .tag-mono { background: var(--bg-soft); color: var(--text-muted); border-color: var(--border); font-family: var(--font-mono); font-weight: 500; letter-spacing: 0; }
  .tag-ghost { background: transparent; color: var(--text-dim); border-color: var(--border); font-weight: 500; }

  .quote-stamp {
    flex-shrink: 0;
    transform: rotate(-4deg);
    transform-origin: top right;
    margin-top: -2px;
    margin-right: -8px;
  }
  .stamp {
    border: 2px double var(--danger);
    color: var(--danger);
    padding: 4px 12px 5px;
    border-radius: 3px;
    text-align: center;
    line-height: 1.1;
    opacity: 0.85;
    font-family: var(--font-mono);
    background: color-mix(in oklab, var(--danger) 4%, transparent);
  }
  .stamp-l1 { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
  .stamp-l2 { font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
  .stamp-l3 { font-size: 8px; letter-spacing: 0.04em; opacity: 0.85; margin-top: 1px; }

  .quote-body {
    padding: 28px 60px 30px;
    text-align: center;
    position: relative;
  }
  .density-großzügig .quote-body { padding: 38px 70px 40px; }
  .density-kompakt .quote-body { padding: 22px 48px 24px; }
  .quote-mark {
    font-family: var(--font-serif);
    font-size: 70px;
    color: var(--brand);
    opacity: 0.32;
    line-height: 1;
    position: absolute;
    top: 6px; left: 24px;
    user-select: none;
  }
  .quote-mark-end { left: auto; right: 24px; top: auto; bottom: -10px; }
  .quote-text {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 500;
    line-height: 1.36;
    margin: 0 auto;
    max-width: 64ch;
    color: var(--text);
    text-wrap: balance;
    letter-spacing: -0.005em;
  }
  .density-großzügig .quote-text { font-size: 30px; }
  .density-kompakt .quote-text { font-size: 22px; }
  .sarcasm-beißend .quote-text { font-style: italic; }
  .sarcasm-mild .quote-text { color: var(--text-muted); }

  .quote-foot {
    border-top: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-elev) 0%, var(--bg-soft) 100%);
    padding: 16px 22px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .quote-author { display: flex; align-items: center; gap: 12px; }
  .quote-author-avatar {
    width: 40px; height: 40px;
    background: var(--bg-deep);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }
  .quote-author-meta { line-height: 1.35; }
  .quote-author-name { font-size: 13.5px; font-weight: 600; }
  .quote-author-role { font-size: 11.5px; color: var(--text-muted); }
  .quote-author-btr { font-size: 10.5px; color: var(--text-dim); font-family: var(--font-mono); }

  .quote-actions { display: flex; flex-wrap: wrap; gap: 6px; }

  /* ── Buttons (Vaadin-Lumo-inspiriert) ─────────────── */
  .btn {
    appearance: none;
    display: inline-flex; align-items: center; gap: 7px;
    padding: 0 14px;
    height: 32px;
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background .1s, border-color .1s, transform .1s;
    white-space: nowrap;
  }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .btn-primary:hover { background: var(--brand-deep); border-color: var(--brand-deep); }
  .btn-secondary { background: var(--bg-elev); }
  .btn-secondary:hover { background: var(--bg-soft); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--bg-soft); color: var(--text); }
  .btn-count {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
    background: var(--bg-soft);
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 2px;
  }
  .btn-primary .btn-count { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.9); }

  /* ── Kommentare ──────────────────────────────────── */
  .comment-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .comment {
    display: flex; gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .comment:last-child { border-bottom: 0; }
  .comment.is-self { background: var(--brand-tint); }
  .theme-lumo-dark .comment.is-self { background: color-mix(in oklab, var(--brand) 12%, transparent); }
  .comment-avatar {
    width: 32px; height: 32px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .comment.is-self .comment-avatar {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
  }
  .comment-main { flex: 1; min-width: 0; }
  .comment-meta {
    display: flex; gap: 10px; align-items: baseline;
    margin-bottom: 3px;
    flex-wrap: wrap;
  }
  .comment-name { font-size: 12.5px; font-weight: 600; }
  .comment-role { font-size: 10.5px; color: var(--text-dim); font-family: var(--font-mono); }
  .comment-time { font-size: 10.5px; color: var(--text-dim); margin-left: auto; font-family: var(--font-mono); }
  .comment-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .comment-actions {
    display: flex; gap: 16px;
    margin-top: 4px;
  }
  .link-btn {
    appearance: none; background: none; border: 0;
    color: var(--text-dim);
    font: inherit;
    font-size: 11px;
    padding: 2px 0;
    cursor: pointer;
  }
  .link-btn:hover { color: var(--brand); text-decoration: underline; }

  .comment-form {
    padding: 14px 18px;
    background: var(--bg-soft);
    border-top: 1px solid var(--border);
  }
  .comment-form textarea {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg-elev);
    color: var(--text);
    padding: 10px 12px;
    font: inherit;
    font-size: 13px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    min-height: 64px;
  }
  .comment-form textarea:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 18%, transparent);
  }
  .comment-form-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .comment-form-hint {
    font-size: 10.5px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* ── Stats ────────────────────────────────────────── */
  .kpi-list { margin: 0; padding: 0; }
  .kpi {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .kpi:last-child { border-bottom: 0; }
  .kpi dt { font-size: 12px; color: var(--text-muted); }
  .kpi dd { margin: 0; text-align: right; line-height: 1.2; }
  .kpi-v {
    display: block;
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-serif);
    color: var(--text);
  }
  .kpi-sub { display: block; font-size: 10.5px; color: var(--text-dim); font-family: var(--font-mono); }

  .plan { list-style: none; margin: 0; padding: 8px 0; }
  .plan li {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 7px 18px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .plan li.is-current {
    background: var(--brand-tint);
    color: var(--brand-deep);
    font-weight: 600;
  }
  .theme-lumo-dark .plan li.is-current {
    background: color-mix(in oklab, var(--brand) 18%, transparent);
    color: color-mix(in oklab, var(--brand) 30%, #fff);
  }
  .plan-time { font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
  .plan-author { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim); }
  .plan li.is-current .plan-author { color: inherit; opacity: 0.75; }

  .hinweise {
    list-style: none; margin: 0; padding: 12px 18px;
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text-muted);
  }
  .hinweise li {
    padding: 7px 0;
    border-bottom: 1px dashed var(--border);
  }
  .hinweise li:last-child { border-bottom: 0; }
  .hinweise b { color: var(--text); font-weight: 600; }

  .card-formal {
    background: var(--bg-soft);
  }

  /* ── StatusBar ────────────────────────────────────── */
  .statusbar {
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    padding: 6px 24px;
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 12px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
    align-items: center;
  }
  .statusbar-c { text-align: center; }
  .statusbar-r { display: flex; gap: 14px; justify-content: flex-end; }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Print: faltbares Memo */
  @media print {
    .topbar, .sidenav, .stats, .statusbar, .quote-actions, .comment-form { display: none; }
    .quote { box-shadow: none; }
  }
</style>
